- name: Check webhook env
  run: |
    if [ -z "${SLACK_WEBHOOK_URL}" ]; then
      echo "SLACK_WEBHOOK_URL is MISSING"
      exit 1
    else
      echo "SLACK_WEBHOOK_URL is present"
    fi
  env:
    SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    
name: Post Wallet Balances to Slack

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests
      - run: python wallet_report.py
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
